<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your QR Code - Ready to Share</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #4CAF50, #45a049);
            --share-gradient: linear-gradient(135deg, #4299e1, #3182ce);
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            max-width: 420px;
            width: 100%;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--success-gradient);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .container.active::before {
            transform: scaleX(1);
        }

        .container:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        h1 {
            margin: 0 0 24px 0;
            color: #1a202c;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .qr-container {
            position: relative;
            margin-bottom: 28px;
            padding: 24px;
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .qr-container:hover {
            transform: scale(1.02);
        }

        .qr {
            width: 260px;
            height: 260px;
            max-width: 100%;
            border-radius: 12px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }

        .qr:hover {
            transform: scale(1.05);
        }

        .copy-url {
            background: linear-gradient(145deg, #f8fafc, #f1f5f9);
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin: 24px 0;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
            font-size: 14px;
            word-break: break-all;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            user-select: none;
        }

        .copy-url:hover {
            border-color: #3b82f6;
            background: linear-gradient(145deg, #eff6ff, #dbeafe);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);
        }

        .copy-url.copied {
            border-color: #10b981;
            background: linear-gradient(145deg, #ecfdf5, #d1fae5);
            color: #065f46;
        }

        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 28px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            min-height: 56px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .download {
            background: var(--success-gradient);
            color: white;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
        }

        .download:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(76, 175, 80, 0.5);
        }

        .share {
            background: var(--share-gradient);
            color: white;
            box-shadow: 0 8px 25px rgba(66, 153, 225, 0.4);
        }

        .share:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(66, 153, 225, 0.5);
        }

        .back {
            background: linear-gradient(145deg, #f8fafc, #f1f5f9);
            color: #475569;
            border: 2px solid #e2e8f0;
            padding: 16px 24px;
            font-size: 15px;
        }

        .back:hover {
            background: linear-gradient(145deg, #f1f5f9, #e2e8f0);
            border-color: #cbd5e0;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .success-message {
            background: linear-gradient(145deg, #ecfdf5, #d1fae5);
            color: #065f46;
            padding: 14px 20px;
            border-radius: 12px;
            margin: 16px 0;
            font-size: 15px;
            display: none;
            border: 1px solid #a7f3d0;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: none;
            color: #3b82f6;
            font-style: italic;
            font-size: 14px;
            margin-top: 12px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            font-size: 13px;
            color: #64748b;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-weight: 700;
            font-size: 18px;
            color: #1e293b;
            display: block;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 32px 24px;
                margin: 10px;
                border-radius: 20px;
            }
            
            .qr {
                width: 240px;
                height: 240px;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .stats {
                flex-direction: column;
                gap: 12px;
            }
        }

        /* PWA Support */
        @media (display-mode: standalone) {
            body {
                padding: 10px;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(26, 32, 44, 0.95);
                --glass-border: rgba(71, 85, 105, 0.3);
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <h1>✅ Your QR Code</h1>
        
        <div class="qr-container">
            <img src="{{ qr_url }}" alt="QR Code" class="qr" id="qrImage">
            <div class="loading" id="loading">✨ Enhancing QR quality...</div>
        </div>

        <div class="copy-url" id="copyUrl" onclick="copyUrl()">
            <span id="urlText">{{ qr_url }}</span>
            <span id="copyIcon">📋 Click to copy</span>
        </div>
        
        <div class="success-message" id="successMsg">
            ✅ Link copied to clipboard!
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="quality">4K</span>
                Download Quality
            </div>
            <div class="stat">
                <span class="stat-number">100%</span>
                Scan Success
            </div>
            <div class="stat">
                <span class="stat-number">📱</span>
                Mobile Ready
            </div>
        </div>

        <div class="buttons">
            <a href="#" class="btn download" id="downloadBtn">
                📥 Download 4K QR
            </a>
            <button class="btn share" onclick="shareQr()">
                📱 Share QR Code
            </button>
            <a href="/" class="btn back">
                🔄 New QR Code
            </a>
        </div>
    </div>

    <script>
        // Global variables
        const qrUrl = '{{ qr_url }}';
        let highResCanvas = null;

        // Enhanced copy functionality
        async function copyUrl() {
            try {
                await navigator.clipboard.writeText(qrUrl);
                showSuccess();
                updateCopyUI(true);
            } catch (err) {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = qrUrl;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showSuccess();
                updateCopyUI(true);
            }
        }

        function updateCopyUI(copied = false) {
            const copyUrl = document.getElementById('copyUrl');
            const urlText = document.getElementById('urlText');
            const copyIcon = document.getElementById('copyIcon');
            
            if (copied) {
                copyUrl.classList.add('copied');
                copyIcon.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyUrl.classList.remove('copied');
                    copyIcon.textContent = '📋 Click to copy';
                }, 2000);
            }
        }

        function showSuccess() {
            const successMsg = document.getElementById('successMsg');
            successMsg.style.display = 'block';
            document.getElementById('container').classList.add('active');
            setTimeout(() => {
                successMsg.style.display = 'none';
                document.getElementById('container').classList.remove('active');
            }, 2500);
        }

        // Enhanced Web Share API
        async function shareQr() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Scan my QR Code!',
                        text: 'Quickly scan this QR code to visit the link',
                        url: qrUrl
                    });
                } catch (err) {
                    copyUrl();
                }
            } else {
                copyUrl();
            }
        }

        // Ultra high-res QR generation (4K)
        async function generateHighResQR(size = 4096) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = size;
                canvas.height = size;
                ctx.imageSmoothingEnabled = false;
                
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, size, size);
                    resolve(canvas.toDataURL('image/png', 1.0));
                };
                img.src = qrUrl;
            });
        }

        // Pre-generate high-res versions
        window.addEventListener('load', async () => {
            // Generate 2K preview
            const previewCanvas = document.createElement('canvas');
            const previewCtx = previewCanvas.getContext('2d');
            previewCanvas.width = 2048;
            previewCanvas.height = 2048;
            previewCtx.imageSmoothingEnabled = false;
            
            const previewImg = new Image();
            previewImg.crossOrigin = 'anonymous';
            previewImg.onload = () => {
                previewCtx.drawImage(previewImg, 0, 0, 2048, 2048);
                highResCanvas = previewCanvas;
            };
            previewImg.src = qrUrl;
        });

        // Enhanced download with multiple resolutions
        document.getElementById('downloadBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            
            // Show loading
            const btn = e.target.closest('.btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Preparing 4K...';
            btn.style.opacity = '0.7';
            
            try {
                const highResUrl = await generateHighResQR(4096);
                const link = document.createElement('a');
                link.download = `qrcode-4k-${Date.now()}.png`;
                link.href = highResUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showSuccess();
            } catch (err) {
                console.error('Download failed:', err);
                // Fallback to 2K
                if (highResCanvas) {
                    const link = document.createElement('a');
                    link.download = 'qrcode-2k.png';
                    link.href = highResCanvas.toDataURL('image/png');
                    link.click();
                }
            } finally {
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
            }
        });

        // Add keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' && e.ctrlKey) {
                e.preventDefault();
                copyUrl();
            }
            if (e.key === 's' && e.ctrlKey) {
                e.preventDefault();
                shareQr();
            }
        });

        // PWA install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
    </script>
</body>
</html>
